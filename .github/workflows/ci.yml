name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          
      - name: Set up Python
        run: uv python install 3.13
        
      - name: Install dependencies
        run: uv sync --all-groups
        
      - name: Lint and Format
        run: |
          uv run ruff check .
          uv run ruff format --check .
          
      - name: Type Check (Advisory Only)
        # We append '|| true' so typing issues don't block the PR while we are in heavy development.
        # We also specifically only scan 'app' and 'tests', avoiding extraneous folders.
        run: uv run mypy app tests || true
        
      - name: Run Unit & Integration Tests
        env:
          # Use a dummy key so Pydantic validation passes; tests use local mocked clients anyway.
          GROQ_API_KEY: "dummy-key-for-github-actions"
        run: uv run pytest -v --tb=short
